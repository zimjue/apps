<!doctype html>
<html lang="de">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Support – Jürgen Zimmer Apps</title>

<meta name="description" content="Supportseite für die Apps von Jürgen Zimmer. Support and contact for my apps.">

<style>

:root{
--bg:#0b1220;
--txt:#eaf0ff;
--muted:#b7c2e1;
--accent:#66e3ff;
--card:rgba(255,255,255,0.05);
}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
background:var(--bg);
color:var(--txt);
line-height:1.6;
}

.container{
max-width:800px;
margin:auto;
padding:40px 20px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:36px;
gap:16px;
}

.topbar-left{
display:flex;
align-items:center;
gap:14px;
min-width:0;
}

.back-btn{
display:inline-flex;
align-items:center;
gap:8px;
padding:8px 14px;
border-radius:10px;
border:1px solid rgba(255,255,255,.18);
background:transparent;
color:var(--txt);
text-decoration:none;
font-weight:700;
white-space:nowrap;
}

.back-btn:hover{
background:rgba(255,255,255,.06);
text-decoration:none;
}

.lang-switch{
display:flex;
gap:6px;
}

.lang-switch button{
background:none;
border:1px solid var(--accent);
color:var(--accent);
padding:6px 10px;
margin-left:6px;
border-radius:6px;
cursor:pointer;
}

h1{
font-size:36px;
margin-bottom:10px;
}

p{
color:var(--muted);
}

.card{
background:var(--card);
border-radius:16px;
padding:24px;
margin-top:30px;
}

a{
color:var(--accent);
text-decoration:none;
}

a:hover{
text-decoration:underline;
}

ul{
margin-top:10px;
padding-left:20px;
}

.footer{
margin-top:50px;
font-size:14px;
color:var(--muted);
}

</style>

<script>

function setLang(lang){

document.querySelectorAll("[data-de]").forEach(el=>{
el.innerText = el.getAttribute("data-"+lang)
})

document.documentElement.lang = lang

}

</script>

</head>

<body>

<div class="container">

<div class="topbar">
<div class="topbar-left">
<a href="./index.html" class="back-btn">← Alle Apps</a>
</div>

<div class="lang-switch">
<button onclick="setLang('de')">DE</button>
<button onclick="setLang('en')">EN</button>
</div>
</div>

<h1 data-de="Support" data-en="Support">Support</h1>

<p
data-de="Wenn du Fragen, Feedback oder Probleme mit einer meiner Apps hast, kannst du mich jederzeit kontaktieren."
data-en="If you have questions, feedback or problems with one of my apps, feel free to contact me anytime."
>
Wenn du Fragen, Feedback oder Probleme mit einer meiner Apps hast, kannst du mich jederzeit kontaktieren.
</p>

<div class="card">

<h2 data-de="E-Mail Support" data-en="Email Support">E-Mail Support</h2>

<p>
<a href="mailto:juzi7@icloud.com">
juzi7@icloud.com
</a>
</p>

</div>

<div class="card">

<h2 data-de="Meine Apps" data-en="My Apps">Meine Apps</h2>

<ul>
<li><a href="/apps/lebensrad/">Lebensrad (Life Wheel)</a></li>
<li><a href="/apps/fitnessgoals/">FitnessGoals</a></li>
<li><a href="/apps/erfolgsjournal/">Erfolgsjournal</a></li>
</ul>

</div>

<div class="footer">
© 2026 Jürgen Zimmer
</div>

</div>

</body>
</html>
