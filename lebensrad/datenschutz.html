<!doctype html>
<html lang="de">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Lebensrad – Datenschutz</title>

<meta name="theme-color" content="#0b1220">

<style>

:root{
--bg:#0b1220;
--card:#121b2f;
--txt:#eaf0ff;
--muted:#b7c2e1;
--accent:#66e3ff;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
background:var(--bg);
color:var(--txt);
}

.wrap{
max-width:900px;
margin:auto;
padding:40px 20px 60px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:24px;
}

.brand{
font-weight:700;
}

.lang-switch{
display:flex;
gap:10px;
}

.lang-btn{
padding:8px 14px;
border-radius:10px;
border:1px solid rgba(255,255,255,.2);
background:transparent;
color:var(--txt);
cursor:pointer;
font-weight:600;
}

.lang-btn.active{
background:var(--accent);
color:#000;
border:none;
}

.card{
background:rgba(255,255,255,.06);
border:1px solid rgba(255,255,255,.12);
border-radius:18px;
padding:26px;
}

h1{font-size:30px;margin-bottom:12px}

h2{
margin-top:24px;
font-size:18px;
}

p{
color:var(--muted);
line-height:1.7;
font-size:15px;
}

.footer{
margin-top:30px;
font-size:13px;
color:var(--muted);
}

.sep{
height:1px;
background:rgba(255,255,255,.1);
margin:24px 0;
border:0;
}

a{color:var(--accent);text-decoration:none}

</style>

</head>

<body>

<div class="wrap">

<div class="topbar">

<div class="brand">
Lebensrad – Life Wheel
</div>

<div class="lang-switch">
<button class="lang-btn active" id="btn-de" onclick="setLang('de')">DE</button>
<button class="lang-btn" id="btn-en" onclick="setLang('en')">EN</button>
</div>

</div>

<div class="card">

<div id="content"></div>

<div class="footer">

<p id="updated"></p>

<p>
<a href="https://www.apple.com/legal/internet-services/itunes/dev/stdeula/" target="_blank">
Apple Standard EULA
</a>
</p>

</div>

</div>

</div>

<script>

const content = {

de: `
<h1>Datenschutz – Lebensrad (Life Wheel)</h1>

<p>
Der Schutz deiner Daten ist uns wichtig. Die App <strong>Lebensrad (Life Wheel)</strong>
dient der persönlichen Reflexion und Bewertung verschiedener Lebensbereiche.
</p>

<p>
Alle Inhalte werden ausschließlich lokal auf deinem Gerät gespeichert.
</p>

<h2>1. Welche Daten werden verarbeitet?</h2>
<p>
Die App speichert Inhalte, die du selbst eingibst (z.B. Bewertungen oder Notizen).
Diese Daten verbleiben auf deinem Gerät und werden nicht an externe Server übertragen.
</p>

<h2>2. Tracking / Analyse / Werbung</h2>
<p>
Es werden keine Tracking-, Analyse- oder Werbedienste verwendet.
</p>

<h2>3. Drittanbieter</h2>
<p>
Es werden keine Drittanbieter-Dienste eingesetzt.
</p>

<h2>4. In-App-Abonnement</h2>
<p>
Die App bietet ein optionales Abonnement für den PDF-Export.
Die Zahlungsabwicklung erfolgt über Apple (App Store).
</p>

<h2>5. Deine Rechte</h2>
<p>
Du kannst deine Daten jederzeit löschen oder die App deinstallieren.
</p>

<h2>6. Kontakt</h2>
<p>
Bei Fragen zum Datenschutz kontaktiere bitte:
<a href="mailto:juzi7@icloud.com">juzi7@icloud.com</a>
</p>
`,

en: `
<h1>Privacy Policy – Life Wheel</h1>

<p>
Your privacy matters. <strong>Life Wheel</strong> helps you reflect on
different areas of your life.
</p>

<p>
All content is stored locally on your device.
</p>

<h2>1. What data is processed?</h2>
<p>
The app stores content you enter such as notes or ratings.
This data remains on your device.
</p>

<h2>2. Tracking / Analytics / Ads</h2>
<p>
No tracking or analytics services are used.
</p>

<h2>3. Third parties</h2>
<p>
No third-party services are used.
</p>

<h2>4. In-App Subscription</h2>
<p>
The app offers an optional subscription for PDF export.
Payments are processed by Apple.
</p>

<h2>5. Your choices</h2>
<p>
You can delete your data at any time or uninstall the app.
</p>

<h2>6. Contact</h2>
<p>
If you have questions please contact:
<a href="mailto:juzi7@icloud.com">juzi7@icloud.com</a>
</p>
`

}

function setLang(lang){

document.getElementById("content").innerHTML = content[lang]

document.documentElement.lang = lang

document.getElementById("btn-de").classList.toggle("active",lang==="de")
document.getElementById("btn-en").classList.toggle("active",lang==="en")

document.getElementById("updated").textContent =
lang==="de" ? "Stand: 2026" : "Last updated: 2026"

localStorage.setItem("lang",lang)

}

const savedLang = localStorage.getItem("lang") || "de"
setLang(savedLang)

</script>

</body>
</html>
